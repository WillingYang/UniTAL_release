dataset_name: anet
train_split: ['training']
val_split: ['validation']
dataset: {
  json_file: /home/ywl/disk1/Datasets/activitynet/a1.3_i3d/anet_1.3/annotations/anet1.3_i3d_filtered.json,
  feat_folder: /home/ywl/disk1/Datasets/activitynet/a1.3_i3d/anet_1.3/i3d_features,
  subset_file: 'splits/train_{r1}_test_{r2}/ActivityNet/{mode}/split_{r3}.list',  
  file_prefix: v_,
  file_ext: .npy,
  input_dim: 2048,
  feat_stride: 16,
  num_frames: 16,
  default_fps: 25,
  trunc_thresh: 0.5,
  crop_ratio: [0.9, 1.0],
  # upsample the features to a fixed length of 192
  max_seq_len: 192,
  force_upsampling: True,
  data_split: 75,
}

model: {
  fpn_type: identity,
  max_buffer_len_factor: 1.0,
  # 192 - 96 - 48 - 24 - 12 - 6
  n_mha_win_size: [7, 7, 7, 7, 7, -1],
  # shrink the model for reduced input feature channels
  n_head: 4,
  embd_dim: 256,
  fpn_dim: 256,
  head_dim: 256,
  use_abs_pe: True,
  topk_ratio: 0.1,
  threshold: 10,
  text_model: "/home/ywl/disk1/projects/Ti-FAD-main-1/libs/modeling/openai"
}

opt: {
  learning_rate: 0.0001,
  epochs: 10,
  weight_decay: 0.05,
  prior_prob: 0.15, 
  num_pred: 200 
}

loader: {
  batch_size: 16,
}

train_cfg: {
  init_loss_norm: 200,
  clip_grad_l2norm: 1.0,
  cls_prior_prob: 0.01,
  center_sample: radius,
  center_sample_radius: 1.5,
  label_smoothing: 0.1,
  droppath: 0.1,
  loss_weight: 2.0,
}

# similar to THUMOS
test_cfg: {
  voting_thresh: 0.9,
  pre_nms_topk: 2000,
  # max of 100 predictions per video
  max_seg_num: 500,
  min_score: 0.001,
  # score fusion
  nms_sigma : 0.6,
  ext_score_file: /home/ywl/disk1/Datasets/activitynet/a1.3_i3d/anet_1.3/annotations/cuhk_val_simp_share.json,
  duration_thresh: 0.001,
}
output_folder: ./ckpt/